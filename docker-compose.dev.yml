version: "3.9"

# ============================================================
# Sk6.0 — Development Override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# Hot-reload, relaxed limits, no TLS, single API replica.
# Alertmanager / Loki / Promtail not started in dev (too heavy).
#
# Host port block: 16XXX (Sk6.0-reserved), all bound to 127.0.0.1
# so other projects on the same machine (RxBB/Frappe bench, rxbb-kb,
# Mosaic, system Redis) keep their default ports unaffected.
# Access from a laptop via SSH tunnel, e.g.:
#   ssh -L 16080:127.0.0.1:16080 -L 16300:127.0.0.1:16300 <host>
# ============================================================

services:

  # Single API with hot-reload (uvicorn --reload)
  api-1:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.dev
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app
      --log-level debug
    volumes:
      - ./backend:/app
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://sk6:devpassword@pgbouncer:6432/sk6
      REDIS_URL: redis://:devpassword@redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_ACCESS_KEY: devaccess
      RUSTFS_SECRET_KEY: devsecret123
      RUSTFS_BUCKET: sk6-static
    ports:
      - "127.0.0.1:16800:8000"   # Direct API access for testing
      - "127.0.0.1:16678:5678"   # debugpy remote debugger

  # Disable production replicas in dev
  api-2:
    profiles: ["disabled"]
  api-3:
    profiles: ["disabled"]

  # Celery worker with auto-reload
  celery-worker-1:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.dev
    command: >
      watchmedo auto-restart --directory=/app --pattern=*.py --recursive --
      celery -A app.infrastructure.tasks.celery_app worker
      --loglevel=debug --concurrency=2 --hostname=dev-worker@%h
      --queues=settlements,notifications,default
    volumes:
      - ./backend:/app
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://sk6:devpassword@pgbouncer:6432/sk6
      REDIS_URL: redis://:devpassword@redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_ACCESS_KEY: devaccess
      RUSTFS_SECRET_KEY: devsecret123
      RUSTFS_BUCKET: sk6-static

  celery-worker-2:
    profiles: ["disabled"]

  # Celery beat — dev env override
  celery-beat:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ./backend:/app
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://sk6:devpassword@pgbouncer:6432/sk6
      REDIS_URL: redis://:devpassword@redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production

  # Flower — override command to use dev redis (no password mismatch)
  flower:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ./backend:/app
    command: >
      celery -A app.infrastructure.tasks.celery_app flower
      --port=5555
      --basic_auth=admin:admin
      --url_prefix=flower
      --broker_api=redis://:devpassword@redis:6379/0
    environment:
      REDIS_URL: redis://:devpassword@redis:6379/0
      FLOWER_USER: admin
      FLOWER_PASSWORD: admin
    ports:
      - "127.0.0.1:16555:5555"   # Direct Flower UI access

  # PgBouncer — dev: plain-text password storage so it can SCRAM with Postgres 16
  pgbouncer:
    environment:
      DB_PASSWORD: devpassword
      AUTH_TYPE: plain

  # Postgres — expose port for DBeaver / pgAdmin
  postgres:
    ports:
      - "127.0.0.1:16432:5432"
    environment:
      POSTGRES_PASSWORD: devpassword
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=256MB
      -c log_min_duration_statement=100
      -c log_statement=all

  # Redis — password kept so all services use consistent auth
  redis:
    command: >
      redis-server
      --requirepass devpassword
      --loglevel verbose
      --maxmemory-policy volatile-lru
    ports:
      - "127.0.0.1:16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "devpassword", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # RustFS — expose ports for direct access in dev
  rustfs:
    environment:
      RUSTFS_ACCESS_KEY: devaccess
      RUSTFS_SECRET_KEY: devsecret123
    ports:
      - "127.0.0.1:16100:9000"   # S3 API
      - "127.0.0.1:16101:9001"   # Web console

  # Grafana — direct access in dev
  grafana:
    ports:
      - "127.0.0.1:16300:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: "http://localhost:16300"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"

  # Prometheus — direct access in dev
  prometheus:
    ports:
      - "127.0.0.1:16090:9090"
    depends_on: []   # No alertmanager dependency in dev

  # Nginx — no TLS; shadow sk6.conf with dev config to avoid cert/domain errors
  nginx:
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/sk6.conf:ro
    ports:
      - "127.0.0.1:16080:80"
