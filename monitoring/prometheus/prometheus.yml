# ============================================================
# Sk6.0 — Prometheus Configuration
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "sk6"
    environment: "production"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
      timeout: 10s

rule_files:
  - "alerts.yml"

scrape_configs:

  # FastAPI replicas — prometheus-fastapi-instrumentator auto-exposes /metrics
  - job_name: "sk6-api"
    static_configs:
      - targets:
          - "api-1:8000"
          - "api-2:8000"
          - "api-3:8000"
    metrics_path: /metrics
    scheme: http

  # Celery workers — exposes celery_* metrics if flower-exporter is wired
  # or via prometheus-celery-exporter (add if needed)
  - job_name: "sk6-flower"
    static_configs:
      - targets: ["flower:5555"]
    metrics_path: /flower/metrics

  # RustFS — S3-compatible object storage metrics
  - job_name: "sk6-rustfs"
    static_configs:
      - targets: ["rustfs:9000"]
    metrics_path: /minio/v2/metrics/cluster
    scheme: http

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Alertmanager self-monitoring
  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]

  # Loki self-monitoring
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
    metrics_path: /metrics
