# ============================================================
# Sk6.0 — Promtail Configuration
# Collects JSON logs from all Docker containers on sk6-net
# and ships to Loki.
# ============================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s

scrape_configs:
  # ── Docker container logs ──────────────────────────────────
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: label
            values: ["com.docker.compose.project=sk6"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/sk6-(.*)'
        target_label: service
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      - source_labels: [__meta_docker_container_name]
        target_label: container

    pipeline_stages:
      # Parse structlog JSON from FastAPI and Celery containers
      - json:
          expressions:
            level: level
            event: event
            request_id: request_id
            user_id: user_id
            status_code: status_code
            duration_ms: duration_ms
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          action_on_failure: skip
      # Drop noisy health check logs
      - drop:
          expression: '.*GET /health.*'
          drop_counter_reason: health_check_noise
      - drop:
          expression: '.*GET /metrics.*'
          drop_counter_reason: metrics_scrape_noise
