# ============================================================
# Sk6.0 — Nginx Production Configuration
# Handles: TLS termination, load balancing across 3 API
# replicas, rate limiting, gzip, static file serving.
# ============================================================

# ── Upstream: 3 FastAPI replicas ─────────────────────────
upstream sk6_api {
    least_conn;                    # Route to least busy replica
    server api-1:8000 max_fails=3 fail_timeout=30s;
    server api-2:8000 max_fails=3 fail_timeout=30s;
    server api-3:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;                  # Persist connections to upstream
}

# ── Rate limit zones ─────────────────────────────────────
# $binary_remote_addr uses ~64 bytes vs $remote_addr ~128 bytes
limit_req_zone $binary_remote_addr zone=login_zone:10m       rate=10r/m;
limit_req_zone $binary_remote_addr zone=register_zone:10m    rate=5r/h;
limit_req_zone $binary_remote_addr zone=otp_zone:10m         rate=3r/m;
limit_req_zone $binary_remote_addr zone=general_zone:20m     rate=300r/m;
limit_req_zone $binary_remote_addr zone=upload_zone:5m       rate=10r/m;

limit_req_status 429;

# ── HTTP → HTTPS redirect ────────────────────────────────
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;    # Let's Encrypt HTTP-01 challenge
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ${DOMAIN};        # Set via envsubst or directly

    # ── TLS Configuration ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    ssl_protocols TLSv1.3;                  # TLS 1.3 ONLY — 1.0/1.1/1.2 disabled
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security Headers ───────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Gzip Compression ───────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml
        application/xml;

    # ── Request limits ─────────────────────────────────
    client_max_body_size 10m;          # Max for screenshot uploads
    client_body_timeout 30s;
    client_header_timeout 10s;
    send_timeout 30s;

    # ── Auth Endpoints — Strict rate limits ────────────
    location = /api/v1/auth/login {
        limit_req zone=login_zone burst=5 nodelay;
        proxy_pass http://sk6_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location = /api/v1/auth/register {
        limit_req zone=register_zone burst=2 nodelay;
        proxy_pass http://sk6_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location ~ ^/api/v1/auth/otp {
        limit_req zone=otp_zone burst=1 nodelay;
        proxy_pass http://sk6_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── File Upload — Separate limit zone ──────────────
    location = /api/v1/recharge/request {
        limit_req zone=upload_zone burst=3 nodelay;
        client_max_body_size 10m;
        proxy_pass http://sk6_api;
        proxy_read_timeout 60s;        # Longer timeout for file upload
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── All other API routes ────────────────────────────
    location /api/ {
        limit_req zone=general_zone burst=50 nodelay;
        proxy_pass http://sk6_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Static files → RustFS object storage ──────────
    # Files are uploaded to RustFS by the API and served here.
    # Bucket: sk6-static. Path-style: /sk6-static/{key}
    location /static/ {
        proxy_pass http://rustfs:9000/sk6-static/;
        proxy_set_header Host rustfs:9000;
        proxy_hide_header x-amz-id-2;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-rustfs-request-id;
        expires 7d;
        add_header Cache-Control "public, immutable";
        location ~* \.(php|py|sh|env)$ {
            deny all;
        }
    }

    # ── Grafana (internal monitoring — IP-restricted) ──
    location /grafana/ {
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
    }

    # ── Flower — Celery monitoring (internal only) ─────
    location /flower/ {
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://flower:5555/flower/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── RustFS Console (internal only) ────────────────
    location /rustfs/ {
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://rustfs:9001/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Health check (no rate limiting) ───────────────
    location = /health {
        proxy_pass http://sk6_api/health;
        access_log off;
    }

    # ── Block common attack paths ──────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|git|htaccess|htpasswd|ini|log|sh|sql|conf|bak)$ {
        deny all;
    }
}
